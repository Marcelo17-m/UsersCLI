stages:
  - build
  - test
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

before_script:
  - echo "Iniciando pipeline..."
  - java -version
  - mvn -version

# BUILD
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

# TESTS
test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn test
  dependencies:
    - build

# PACKAGE (JAR)
package:
  stage: package
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
  only:
    - main
