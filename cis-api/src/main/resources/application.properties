# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# API base path  (todos los endpoints quedan bajo /api/v1/...)
# ============================================================
spring.mvc.servlet.path=/api/v1

# ============================================================
# MySQL same container as the CLI (sd3db / port 3307)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3307/sd3?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sd5
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# SpringDoc / Swagger UI
# ============================================================
# Swagger UI will be available at: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
